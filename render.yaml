databases:
  - name: vinta_schedule_api-staging-postgres
    databaseName: vinta_schedule_api
    plan: free
    user: vinta_schedule_api

services:
  - type: redis
    name: vinta_schedule_api-staging-redis
    plan: free
    ipAllowList: [] # only allow internal connections

  - type: web
    name: vinta_schedule_api-staging
    plan: free
    runtime: python
    branch: main
    autoDeploy: true
    buildCommand: "./render_build.sh"
    startCommand: "uv run gunicorn vinta_schedule_api.wsgi:application --limit-request-line 8188 --log-file -"
    envVars:
      - key: ENABLE_DJANGO_COLLECTSTATIC
        value: 1
      - key: AUTO_MIGRATE
        value: 1
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vinta_schedule_api-staging-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vinta_schedule_api-staging-redis
          property: connectionString
      - fromGroup: python-services
      - fromGroup: integrations-credentials
      - fromGroup: aws-storage

  - type: worker
    name: worker-default-staging
    runtime: python
    env: python
    branch: main
    autoDeploy: true
    buildCommand: uv sync --frozen --no-dev --no-install-project
    startCommand: "uv run celery --app=vinta_schedule_api worker --loglevel=info --max-memory-per-child=$WORKER_MAX_MEMORY  --concurrency=$WORKER_CONCURRENCY"
    envVars:
      - key: REMAP_SIGTERM
        value: SIGQUIT
      - key: CELERY_BROKER_POOL_LIMIT
        value: 1
      - key: CELERY_BROKER_CONNECTION_TIMEOUT
        value: 30.0
      - key: CELERY_REDIS_MAX_CONNECTIONS
        value: null
      - key: CELERY_TASK_ACKS_ON_FAILURE_OR_TIMEOUT
        value: true
      - key: CELERY_TASK_REJECT_ON_WORKER_LOST
        value: false
      - key: CELERY_WORKER_PREFETCH_MULTIPLIER
        value: 1
      - key: CELERY_WORKER_CONCURRENCY
        sync: false
      - key: CELERY_WORKER_MAX_TASKS_PER_CHILD
        value: 1000
      - key: CELERY_WORKER_SEND_TASK_EVENTS
        value: true
      - key: CELERY_EVENT_QUEUE_EXPIRES
        value: 60.0
      - key: CELERY_EVENT_QUEUE_TTL
        value: 5.0
      - key: WORKER_MAX_MEMORY
        sync: false
      - key: WORKER_CONCURRENCY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vinta_schedule_api-staging-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vinta_schedule_api-staging-redis
          property: connectionString
      - fromGroup: python-services
      - fromGroup: integrations-credentials
      - fromGroup: aws-storage
  - type: worker
    name: beat-staging
    runtime: python
    env: python
    branch: main
    autoDeploy: true
    buildCommand: uv sync --frozen --no-dev --no-install-project
    startCommand: "uv run celery --app=vinta_schedule_api beat --loglevel=info"
    envVars:
      - key: REMAP_SIGTERM
        value: SIGQUIT
      - key: DATABASE_URL
        fromDatabase:
          name: vinta_schedule_api-staging-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vinta_schedule_api-staging-redis
          property: connectionString
      - fromGroup: python-services
      - fromGroup: integrations-credentials
      - fromGroup: aws-storage

envVarGroups:
  - name: python-services
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: UV_VERSION
        value: 0.11.18
      - key: SECRET_KEY
        generateValue: true
      # Fernet at-rest encryption salt. generateValue is fine for a fresh deploy;
      # if data is already encrypted with another key, set the existing value here
      # instead — rotating it makes prior encrypted fields unreadable.
      - key: SALT_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: vinta_schedule_api.settings.staging
      - key: ALLOWED_HOSTS
        value: '*'
      - key: SITE_DOMAIN
        value: 'https://schedule-staging.vintasoftware.com'
      - key: API_DOMAIN
        value: 'https://api.schedule-staging.vintasoftware.com'
      # Staging frontend base; account/email flows link here (settings/staging.py).
      - key: FRONTEND_BASE_URL
        value: 'https://schedule-staging.vintasoftware.com'
      - key: SENTRY_DSN
        sync: false
      - key: DEFAULT_BCC_EMAILS
        value: 'hugo@vinta.com.br'
  - name: integrations-credentials
    envVars:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      # Google OAuth / Calendar integration. Set real values in the dashboard.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Twilio SMS (vintasend). ACCOUNT_SID + NUMBER required — boot fails if unset.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      # Preferred: API Key auth. Set both. Falls back to TWILIO_AUTH_TOKEN if unset.
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      # Legacy auth-token auth (not recommended). Used only if API key vars unset.
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_NUMBER
        sync: false
      - key: TWILIO_DEFAULT_BROADCAST_NUMBERS
        sync: false
      # Per-environment rollout gate for SMS phone verification. Default off;
      # flip to true in the Render dashboard once Twilio approves this
      # environment's messaging profile.
      - key: ACCOUNT_PHONE_VERIFICATION_ENABLED
        value: false
      # Shared secret used to verify MercadoPago's `x-signature` webhook header.
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      # Stripe secret API key. No organization is routed onto Stripe yet.
      - key: STRIPE_SECRET_KEY
        sync: false
      # Shared secret used to verify Stripe's `Stripe-Signature` webhook header.
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Global fallback grace window (days) between a failed recurring charge and
      # an organization moving from GRACE to RESTRICTED, used when the
      # subscription's plan carries no grace_period_days of its own.
      - key: BILLING_DEFAULT_GRACE_PERIOD_DAYS
        value: 7

  # AWS S3 + CloudFront storage. Values come from the Terragrunt/Scalr stack
  # under infrastructure/ — see `terragrunt output`. Secrets are sync:false so
  # they are set in the Render dashboard, never committed.
  - name: aws-storage
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      # Media bucket (private, served via signed CloudFront URLs).
      - key: AWS_MEDIA_BUCKET_NAME
        sync: false
      - key: AWS_MEDIA_REGION
        value: us-east-1
      - key: AWS_MEDIA_S3_ENDPOINT_URL
        value: https://s3.us-east-1.amazonaws.com
      # CloudFront distribution domain for media (terragrunt: media_cloudfront_domain).
      - key: AWS_MEDIA_S3_CUSTOM_DOMAIN
        sync: false
      # CloudFront signed-URL key pair (terragrunt: cloudfront_key_id / cloudfront_private_key).
      - key: AWS_CLOUDFRONT_KEY_ID
        sync: false
      - key: AWS_CLOUDFRONT_KEY
        sync: false
      # Static bucket + its CloudFront domain (terragrunt: static_bucket_name / static_cloudfront_domain).
      - key: AWS_STATIC_BUCKET_NAME
        sync: false
      - key: AWS_STATIC_REGION
        value: us-east-1
      - key: AWS_STATIC_S3_CUSTOM_DOMAIN
        sync: false
