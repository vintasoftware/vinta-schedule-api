# yaml-language-server: $schema=./node_modules/vinta-ai-workflows/schemas/vinta-ai-workflows-config.v1.schema.json

schema_version: 1
vinta_ai_workflows_version: "0.2.0"
last_synced_at: "2026-07-17T00:00:00Z"

project:
  name: vinta_schedule_api
  default_branch: main
  code_host: github
  stack_summary: "Django 6 + DRF + Strawberry GraphQL + Celery, multi-tenant (OrganizationModel), Postgres, deployed to Render"
  ai_plans_dir: ai-plans
  pr_template_paths: []

# Container surface (`docker compose run --rm api ...`) — the one AGENTS.md points daily
# app work at. The host surface (bare `uv run ...`) is what pre-commit and CI use.
commands:
  lint: "docker compose run --rm api uv run ruff check ./"
  format: "docker compose run --rm api uv run ruff format ./"
  build: "docker compose run --rm api uv run python manage.py check --deploy"
  test_unit: "docker compose run --rm api uv run pytest -n auto"
  test_unit_scoped: "docker compose run --rm api uv run pytest <app>/tests/ -n auto"
  test_unit_new_pattern: "docker compose run --rm api uv run pytest <new-test-path> -vs"

policies:
  pr_creation: agents-create
  ai_coauthor: forbidden
  commit_style: conventional
  commit_strategy: ask
  stage_pattern: "git add <explicit paths>"
  anti_git_add_all_reason: "repo root holds untracked .env / .env.docker, generated schema.yml / schema-auth.yml, .coverage, mailpit-data — `git add -A` will sweep them in"
  dependency_licenses:
    enforcement: block
    forbidden_spdx:
      - GPL-2.0-only
      - GPL-3.0-only
      - AGPL-3.0-only
      - SSPL-1.0
    allowed_overrides: []
    notes: ""

vendors:
  - claude
  - cursor
  - copilot

foundation_skills:
  plan-feature: enabled
  create-spec: enabled
  create-qa-use-cases: disabled
  implement-plan: enabled
  amend-plan: enabled
  open-pr-from-context: enabled
  add-e2e-test: disabled
  add-env-var: enabled
  systematic-debugging: enabled
  add-one-off-script: enabled
  prepare-worktree: enabled
  deslop-comments: enabled
  handoff: enabled
  thermo-nuclear-code-quality-review: enabled
  handoff-to-client: enabled

foundation_agents:
  implementer: enabled
  reviewer: enabled
  fixer: enabled

# Tiers (1-4) into ai-tools/skills/plan-feature/resources/ai-models.yaml.
# Unset key = that spawn uses the runtime default.
agent_models:
  reviewer: 3
  fixer: 2
  worktree_prep: 1
  integrate: 1

stacks:
  - django

stack_specialist_agents:
  - migration-author

run_options:
  implement-plan:
    pause_between_phases: false
    generate_inline_comments: false
    use_worktree: true
    full_test_suite: false
  amend-plan:
    blast_radius_signal_threshold: 2

skills:
  add-one-off-script:
    scripts_dir: scripts/one_off
    language: python
    log_dir: .vinta-ai-workflows/one-off-runs
    default_batch_size: 500
    csv_max_cells: 1000000
    s3_bucket: ""
    s3_prefix: one-off-runs/
  systematic-debugging:
    observability_mcp_servers: []
  handoff-to-client:
    client_platforms:
      - "Web SPA (React)"
      - "Partner integrations"
    api_style: "REST + GraphQL"
    api_spec_path: "schema.yml (regenerate: make update_schema)"
    output_dir: .vinta-ai-workflows/client-handoffs
  prepare-worktree:
    worktree_root: .claude/worktrees
    deps_strategy: symlink
    compose_network: per-worktree
    test_db_strategy: fork-on-schema-change
    summary_dir: .vinta-ai-workflows/worktrees
