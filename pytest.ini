[pytest]
python_files = test*.py
python_classes = Test*
python_functions = test_*
# --ds takes precedence over the DJANGO_SETTINGS_MODULE env var (set to `local`
# in .env.docker), so tests always run under the test settings.
addopts = --ds=vinta_schedule_api.settings.test --cov=. --cov-report=html:junit/test-results.html
DJANGO_SETTINGS_MODULE = vinta_schedule_api.settings.test
# Safety net: no single test may hang the suite/CI. A stuck test (e.g. an unmocked
# network call or runaway loop) fails with a traceback instead of hanging the runner.
# `signal` interrupts the test in-process so the rest of the session keeps running.
timeout = 10
timeout_method = signal
# Time only the test function, not fixtures/DB setup. Without this the one-time
# test-database migration build (no --reuse-db on CI) is counted against the first
# test's 10s budget and the whole worker times out.
timeout_func_only = true
# pytest-django forces DEBUG=False by default, which silently disables
# VirtualModelSerializer's query-budget guard (it only runs under DEBUG). Keep the
# test settings' DEBUG=True so N+1 regressions fail the suite instead of hiding.
django_debug_mode = true
filterwarnings =
    # strawberry-django 0.86 deprecates its own internal `_django_type` attribute;
    # not actionable on our side until upstream removes it. Remove this on next bump.
    ignore:_django_type is deprecated:UserWarning
markers =
    no_auto_subscription: opt out of conftest's autouse `provision_default_subscription`. For tests that build their own `Subscription` (the field is a OneToOneField, so a second row is an IntegrityError) or that deliberately exercise the plan-less state.
