name: main
on: [push]

jobs:
  build:
    name: Build vinta_schedule_api
    strategy:
      matrix:
        python: [3.13]
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/vinta_schedule_test"
      REDIS_URL: "redis://localhost:6379"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: vinta_schedule_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Store branch and latest SHA
        run: |
          echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
          echo "::set-output name=sha_short::$(git rev-parse --short HEAD)"
        id: git
      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.18"
          enable-cache: true
      - run: curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | sudo bash
      - run: sudo apt-get install git-lfs --upgrade
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: uv sync --frozen
      - name: Generate secret key
        run: echo '::set-output name=SECRET_KEY::`python -c "import uuid; print(uuid.uuid4().hex + uuid.uuid4().hex)"`'
        id: secret_id_generator
      - name: Linting
        run: uv run ruff check ./
        env:
          DJANGO_SETTINGS_MODULE: "vinta_schedule_api.settings.test"
          SECRET_KEY: ${{ steps.secret_id_generator.outputs.SECRET_KEY }}
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/vinta_schedule_test"
          CORS_ALLOWED_ORIGINS: ".example.com"
          ALLOWED_HOSTS: ".example.com"
          SMTP_HOST: 'example.com'
          SMTP_USERNAME: "test"
          SMTP_PASSWORD: "test"
          REDIS_URL: "redis://localhost:6379"
          SITE_DOMAIN: 'example.com'
          API_DOMAIN: 'api.example.com'
          DEFAULT_BCC_EMAILS: 'hugo@example.com'
          AWS_STATIC_BUCKET_NAME: 'example-static'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          AWS_S3_ACCESS_KEY_ID: 'test'
          AWS_S3_SECRET_ACCESS_KEY: 'test'
          AWS_MEDIA_BUCKET_NAME: 'example-media'
          AWS_MEDIA_LOCATION: 'media'
          AWS_MEDIA_S3_CUSTOM_DOMAIN: 'example.com'
          AWS_MEDIA_S3_ENDPOINT_URL: 'https://example.com'
          AWS_S3_REGION_NAME: 'us-east-1'
          AWS_CLOUDFRONT_KEY_ID: 'test'
          AWS_CLOUDFRONT_KEY: 'test'
          SALT_KEY: 'test_salt_key_123'
          TWILIO_ACCOUNT_SID: 'FAKE_ACCOUNT_SID'
          TWILIO_API_KEY_SID: 'FAKE_API_KEY_SID'
          TWILIO_API_KEY_SECRET: 'FAKE_API_KEY_SECRET'
          TWILIO_NUMBER: '+12345678901'
          TWILIO_DEFAULT_BROADCAST_NUMBERS: '+12345678901,+10987654321'


      - run: uv run pre-commit run --all-files
        env:
          SKIP: ruff,eslint,missing-migrations,backend-schema,backend-auth-schema
      - run: uv run python manage.py export_allauth_schema --check
        env:
          DJANGO_SETTINGS_MODULE: "vinta_schedule_api.settings.production"
          SECRET_KEY: ${{ steps.secret_id_generator.outputs.SECRET_KEY }}
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/vinta_schedule_test"
          CORS_ALLOWED_ORIGINS: ".example.com"
          ALLOWED_HOSTS: ".example.org"
          SMTP_HOST: 'example.org'
          SMTP_USERNAME: "test"
          SMTP_PASSWORD: "test"
          REDIS_URL: "redis://localhost:6379"
          SITE_DOMAIN: 'example.com'
          API_DOMAIN: 'api.example.com'
          DEFAULT_BCC_EMAILS: 'hugo@example.com'
          AWS_STATIC_BUCKET_NAME: 'example-static'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          AWS_S3_ACCESS_KEY_ID: 'test'
          AWS_S3_SECRET_ACCESS_KEY: 'test'
          AWS_MEDIA_BUCKET_NAME: 'example-media'
          AWS_MEDIA_LOCATION: 'media'
          AWS_MEDIA_S3_CUSTOM_DOMAIN: 'example.com'
          AWS_MEDIA_S3_ENDPOINT_URL: 'https://example.com'
          AWS_S3_REGION_NAME: 'us-east-1'
          AWS_CLOUDFRONT_KEY_ID: 'test'
          AWS_CLOUDFRONT_KEY: 'test'
          SALT_KEY: 'test_salt_key_123'
          TWILIO_ACCOUNT_SID: 'FAKE_ACCOUNT_SID'
          TWILIO_API_KEY_SID: 'FAKE_API_KEY_SID'
          TWILIO_API_KEY_SECRET: 'FAKE_API_KEY_SECRET'
          TWILIO_NUMBER: '+12345678901'
          TWILIO_DEFAULT_BROADCAST_NUMBERS: '+12345678901,+10987654321'
      - run: uv run python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: "vinta_schedule_api.settings.production"
          SECRET_KEY: ${{ steps.secret_id_generator.outputs.SECRET_KEY }}
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/vinta_schedule_test"
          CORS_ALLOWED_ORIGINS: ".example.com"
          ALLOWED_HOSTS: ".example.org"
          SMTP_HOST: 'example.org'
          SMTP_USERNAME: "test"
          SMTP_PASSWORD: "test"
          REDIS_URL: "redis://localhost:6379"
          SITE_DOMAIN: 'example.com'
          API_DOMAIN: 'api.example.com'
          DEFAULT_BCC_EMAILS: 'hugo@example.com'
          AWS_STATIC_BUCKET_NAME: 'example-static'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          AWS_S3_ACCESS_KEY_ID: 'test'
          AWS_S3_SECRET_ACCESS_KEY: 'test'
          AWS_MEDIA_BUCKET_NAME: 'example-media'
          AWS_MEDIA_LOCATION: 'media'
          AWS_MEDIA_S3_CUSTOM_DOMAIN: 'example.com'
          AWS_MEDIA_S3_ENDPOINT_URL: 'https://example.com'
          AWS_S3_REGION_NAME: 'us-east-1'
          AWS_CLOUDFRONT_KEY_ID: 'test'
          AWS_CLOUDFRONT_KEY: 'test'
          SALT_KEY: 'test_salt_key_123'
          TWILIO_ACCOUNT_SID: 'FAKE_ACCOUNT_SID'
          TWILIO_API_KEY_SID: 'FAKE_API_KEY_SID'
          TWILIO_API_KEY_SECRET: 'FAKE_API_KEY_SECRET'
          TWILIO_NUMBER: '+12345678901'
          TWILIO_DEFAULT_BROADCAST_NUMBERS: '+12345678901,+10987654321'
      - run: uv run python manage.py check --deploy
        env:
          DJANGO_SETTINGS_MODULE: "vinta_schedule_api.settings.production"
          SECRET_KEY: ${{ steps.secret_id_generator.outputs.SECRET_KEY }}
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/vinta_schedule_test"
          CORS_ALLOWED_ORIGINS: ".example.com"
          ALLOWED_HOSTS: ".example.org"
          SMTP_HOST: 'example.org'
          SMTP_USERNAME: "test"
          SMTP_PASSWORD: "test"
          REDIS_URL: "redis://localhost:6379"
          SITE_DOMAIN: 'example.com'
          API_DOMAIN: 'api.example.com'
          DEFAULT_BCC_EMAILS: 'hugo@example.com'
          AWS_STATIC_BUCKET_NAME: 'example-static'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          AWS_S3_ACCESS_KEY_ID: 'test'
          AWS_S3_SECRET_ACCESS_KEY: 'test'
          AWS_MEDIA_BUCKET_NAME: 'example-media'
          AWS_MEDIA_LOCATION: 'media'
          AWS_MEDIA_S3_CUSTOM_DOMAIN: 'example.com'
          AWS_MEDIA_S3_ENDPOINT_URL: 'https://example.com'
          AWS_S3_REGION_NAME: 'us-east-1'
          AWS_CLOUDFRONT_KEY_ID: 'test'
          AWS_CLOUDFRONT_KEY: 'test'
          SALT_KEY: 'test_salt_key_123'
          TWILIO_ACCOUNT_SID: 'FAKE_ACCOUNT_SID'
          TWILIO_API_KEY_SID: 'FAKE_API_KEY_SID'
          TWILIO_API_KEY_SECRET: 'FAKE_API_KEY_SECRET'
          TWILIO_NUMBER: '+12345678901'
          TWILIO_DEFAULT_BROADCAST_NUMBERS: '+12345678901,+10987654321'
      - run: |
          uv run pytest $(ARG) -vs  -n auto --no-header --cov=. --cov-report=xml:junit/test-results.xml --junitxml=junit.xml -o junit_family=legacy
        env:
          DJANGO_SETTINGS_MODULE: "vinta_schedule_api.settings.test"
          SECRET_KEY: ${{ steps.secret_id_generator.outputs.SECRET_KEY }}
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/vinta_schedule_test"
          CORS_ALLOWED_ORIGINS: ".example.com"
          ALLOWED_HOSTS: ".example.com"
          SMTP_HOST: 'example.com'
          SMTP_USERNAME: "test"
          SMTP_PASSWORD: "test"
          REDIS_URL: "redis://localhost:6379"
          SITE_DOMAIN: 'example.com'
          API_DOMAIN: 'api.example.com'
          DEFAULT_BCC_EMAILS: 'hugo@example.com'
          AWS_STATIC_BUCKET_NAME: 'example-static'
          AWS_ACCESS_KEY_ID: 'test'
          AWS_SECRET_ACCESS_KEY: 'test'
          AWS_S3_ACCESS_KEY_ID: 'test'
          AWS_S3_SECRET_ACCESS_KEY: 'test'
          AWS_MEDIA_BUCKET_NAME: 'example-media'
          AWS_MEDIA_LOCATION: 'media'
          AWS_MEDIA_S3_CUSTOM_DOMAIN: 'example.com'
          AWS_MEDIA_S3_ENDPOINT_URL: 'https://example.com'
          AWS_S3_REGION_NAME: 'us-east-1'
          AWS_CLOUDFRONT_KEY_ID: 'test'
          AWS_CLOUDFRONT_KEY: 'test'
          SALT_KEY: 'test_salt_key_123'
          TWILIO_ACCOUNT_SID: 'FAKE_ACCOUNT_SID'
          TWILIO_API_KEY_SID: 'FAKE_API_KEY_SID'
          TWILIO_API_KEY_SECRET: 'FAKE_API_KEY_SECRET'
          TWILIO_NUMBER: '+12345678901'
          TWILIO_DEFAULT_BROADCAST_NUMBERS: '+12345678901,+10987654321'

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: junit/test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          env_vars: OS,PYTHON
          fail_ci_if_error: true
          files: ./junit/test-results.xml
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deploy-staging:
    name: Deploy staging (Render)
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hooks
        run: |
          deploy() {
            local name="$1" url="$2"
            if [ -z "$url" ]; then
              echo "::error::$name secret is not set"; return 1
            fi
            echo "Triggering $name"
            curl -fsSL -X POST "$url"
          }
          rc=0
          deploy "RENDER_DEPLOY_HOOK_URL (web)" "$RENDER_DEPLOY_HOOK_URL" || rc=1
          deploy "RENDER_DEPLOY_HOOK_URL_WORKER" "$RENDER_DEPLOY_HOOK_URL_WORKER" || rc=1
          deploy "RENDER_DEPLOY_HOOK_URL_BEAT" "$RENDER_DEPLOY_HOOK_URL_BEAT" || rc=1
          exit $rc
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_DEPLOY_HOOK_URL_WORKER: ${{ secrets.RENDER_DEPLOY_HOOK_URL_WORKER }}
          RENDER_DEPLOY_HOOK_URL_BEAT: ${{ secrets.RENDER_DEPLOY_HOOK_URL_BEAT }}
